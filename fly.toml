# fly.toml app configuration file generated for surx-registry on 2026-07-11T16:45:54-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'surx-registry'
primary_region = 'gru'

[build]
[env]
  REGISTRY_BASE_URL = 'https://surx-registry.fly.dev'
  REGISTRY_TSA_URL = 'https://freetsa.org/tsr'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
